<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tiny LMS</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cardo&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <h1>Tiny LMS</h1>

    <div class="container">
      <nav data-role="public">
        <ul>
          <li><a href="#/login">Login</a></li>
          <li><a href="#/criar-conta">Criar</a></li>
        </ul>
      </nav>

      <nav data-role="user">
        <ul>
          <li><a href="#/cursos">Cursos</a></li>
          <li><a href="#/certificados">Certificados</a></li>
          <li><a href="#/sair">Sair</a></li>
        </ul>
      </nav>

      <nav data-role="admin">
        <ul>
          <li><a href="#/criar-curso">Criar Curso</a></li>
          <li><a href="#/criar-aulas">Criar Aulas</a></li>
          <li><a href="#/usuarios">Usuários</a></li>
          <li><a href="#/sair">Sair</a></li>
        </ul>
      </nav>

      <section id="login" data-role="public">
        <h2>Login</h2>
        <form id="login-form">
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required />

          <label for="password">Senha:</label>
          <input type="password" id="password" name="password" required />

          <div class="split">
            <button type="submit">Login</button>

            <a href="#/perdeu">Recuperar senha</a>
          </div>
        </form>
      </section>

      <section id="perdeu" data-role="public">
        <h2>Recuperar Senha</h2>
        <form id="recuperar-senha-form">
          <label for="email-perdeu">Email:</label>
          <input type="email" id="email-perdeu" name="email-perdeu" required />

          <button type="submit">Recuperar</button>
        </form>
      </section>

      <section id="resetar" data-role="public">
        <h2>Resetar Senha</h2>
        <form id="resetar-senha-form">
          <label for="new_password">Senha:</label>
          <input
            type="password"
            id="new_password"
            name="new_password"
            required
          />

          <input type="hidden" id="token" name="token" />

          <button type="submit">Resetar</button>
        </form>
      </section>

      <section id="criar-conta" data-role="public">
        <h2>Criar Conta</h2>
        <form id="criar-conta-form">
          <label for="username">Username:</label>
          <input type="text" id="username" name="username" required />

          <label for="name">Nome:</label>
          <input type="text" id="name" name="name" required />

          <label for="email-criar">Email:</label>
          <input type="email" id="email-criar" name="email-criar" required />

          <label for="password-criar">Senha:</label>
          <input
            type="password"
            id="password-criar"
            name="password-criar"
            required
          />

          <button type="submit">Criar Conta</button>
        </form>
      </section>

      <section id="criar-curso" data-role="admin">
        <h2>Cursos</h2>

        <div class="render"></div>

        <h2>Criar Curso</h2>
        <form id="criar-curso-form">
          <label for="slug">Slug:</label>
          <input type="text" id="slug" name="slug" required />

          <label for="title">Nome do Curso:</label>
          <input type="text" id="title" name="title" required />

          <label for="description">Descrição:</label>
          <input type="text" id="description" name="description" required />

          <label for="lessons">Aulas:</label>
          <input type="number" id="lessons" name="lessons" required />

          <label for="hours">Horas:</label>
          <input type="number" id="hours" name="hours" required />

          <button type="submit">Criar/Atualizar Curso</button>
        </form>
      </section>

      <section id="criar-aula" data-role="admin">
        <h2>Cursos</h2>

        <div class="render"></div>

        <h2>Criar Aula</h2>
        <form id="criar-aula-form">
          <label for="course-slug">Curso:</label>
          <input type="text" id="course-slug" name="courseSlug" required />

          <label for="lesson-slug">Slug:</label>
          <input type="text" id="lesson-slug" name="slug" required />

          <label for="lesson-title">Nome da Aula:</label>
          <input type="text" id="lesson-title" name="title" required />

          <label for="lesson-description">Descrição:</label>
          <input
            type="text"
            id="lesson-description"
            name="description"
            required
          />

          <label for="seconds">Segundos:</label>
          <input type="number" id="seconds" name="seconds" required />

          <label for="order">Ordem:</label>
          <input type="number" id="order" name="order" required />

          <label for="free">Gratuita:</label>
          <input type="number" id="free" name="free" required value="0" />

          <label for="file">Video:</label>
          <input type="file" id="file" name="file" />

          <label for="video">Video Path:</label>
          <input type="file" id="video" name="video" />

          <button type="submit">Criar/Atualizar Aula</button>
        </form>
      </section>

      <section id="cursos" data-role="user">
        <h2>Cursos</h2>

        <div class="render"></div>
      </section>

      <section id="aulas" data-role="user">
        <h2>Aulas</h2>

        <div class="render"></div>
      </section>

      <section id="certificados" data-role="user">
        <h2>Certificados</h2>

        <div class="render"></div>
      </section>

      <section id="usuarios" data-role="admin">
        <h2>Usuários</h2>

        <form action="">
          <label for="search">Buscar:</label>
          <input type="text" id="s" name="s" />

          <label for="page">Pagina:</label>
          <input type="number" id="page" name="page" value="1" />

          <button class="hidden">Buscar</button>
        </form>
        <div class="render"></div>
      </section>
    </div>

    <style>
      * {
        box-sizing: border-box;
      }

      html {
        /* fonts */
        --font: "Cardo", serif;
        /* colors */
        --black: #000;
        --grey-1: #171717;
        --grey-2: #222;
        --grey-3: #333;
        --grey-4: #444;
        --grey-5: #555;
        --grey-6: #666;
        --grey-7: #777;
        --white: #fff;
        /* gradients */
        --gradient-1: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.5),
          rgba(255, 255, 255, 0.025)
        );
        --gradient-2: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.1),
          rgba(255, 255, 255, 0.05)
        );
        --gradient-1: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.15),
          rgba(255, 255, 255, 0.1)
        );
      }

      body {
        font-family: var(--font);
        margin-bottom: 600px;
        background: var(--black);
        color: var(--white);
        font-size: 1.25rem;
      }

      ul,
      h1,
      h2,
      h3,
      p {
        margin: 0;
        padding: 0;
      }

      h1 {
        text-align: center;
        font-size: 3rem;
        margin: 2rem 0;
      }

      h2 {
        font-size: 2rem;
        margin: 1.5rem 0;
      }

      a {
        color: var(--grey-7);
        text-decoration: none;
      }

      .container {
        width: 100%;
        max-width: 33rem;
        margin: 0 auto 6rem auto;
        padding: 0.5rem;
      }

      section > form {
        display: grid;
        grid-template-columns: 6rem 1fr;
        gap: 1rem 0.5rem;
        align-items: center;
        margin-left: -7rem;
        margin-bottom: 2rem;
      }

      form button,
      form .split {
        grid-column: 2;
        padding: 0.75rem;
        border: none;
        cursor: pointer;
        border-radius: 100px;
        margin-top: 1rem;
      }

      input,
      label {
        display: block;
        width: 100%;
        font-size: 1rem;
        border: 1px solid var(--grey-2);
        padding: 0.75rem;
        font-family: sans-serif;
        border-radius: 100px;
        color: var(--grey-5);
        background: var(--gradient-1);
        box-shadow: inset 0 0 0 2px var(--black);
      }

      label {
        color: var(--white);
        font-size: 0.85rem;
        background: var(--gradient-2);
      }

      input:focus {
        outline: none;
        border-color: var(--white);
      }

      .split {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
      }

      button,
      .btn,
      select {
        font-size: 1rem;
        display: block;
        width: max-content;
        min-width: 160px;
        padding: 0.75rem 1.5rem;
        appearance: none;
        font-family: sans-serif;
        border-radius: 100px;
        color: var(--white);
        border: 1px solid var(--grey-2);
        background: var(--gradient-2);
        box-shadow: inset 0 0 0 2px var(--black);
        text-decoration: none;
        cursor: pointer;
      }

      button:hover,
      .btn:hover,
      select:hover {
        border-color: var(--grey-3);
        background: var(--gradient-3);
      }

      button:focus,
      .btn:focus,
      select:focus {
        outline: none;
        border-color: var(--white);
      }

      nav {
        margin-bottom: 2rem;
      }

      nav ul {
        display: flex;
        justify-content: space-around;
        list-style: none;
        border: 1px solid var(--grey-2);
        border-radius: 100px;
        padding: 2px;
      }

      nav li {
        display: block;
        flex: 1;
      }

      nav a {
        font-size: 1rem;
        width: 100%;
        padding: 0.5rem;
        text-align: center;
        font-family: var(--font);
        text-decoration: none;
        display: block;
        border: none;
        color: var(--white);
        background: var(--gradient-2);
      }

      nav li:first-child a {
        border-top-left-radius: 100px;
        border-bottom-left-radius: 100px;
      }

      nav li:last-child a {
        border-top-right-radius: 100px;
        border-bottom-right-radius: 100px;
      }

      nav a:hover,
      nav a.active {
        background: var(--gradient-3);
      }

      select {
        width: 100%;
        margin-bottom: 2px;
      }

      section,
      .render {
        animation: slideIn 0.3s ease-out forwards;
      }

      [data-role] {
        display: none;
      }
      
      [data-role].ativo {
        display: block;
      }

      @media (width < 47rem) {
        section > form {
          margin-left: 0;
        }
      }

      @media (width < 28rem) {
        section > form {
          grid-template-columns: 5rem 1fr;
          gap: 0.5rem;
        }

        label {
          font-size: 0.75rem;
        }

        form .split {
          flex-direction: column;
          align-items: start;
        }
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </body>
</html>
