<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tiny LMS</title>
  </head>
  <body>
    <style>
      * {
        box-sizing: border-box;
        font-family: monospace;
      }
      body {
        background: black;
        color: white;
        font-size: 1.125rem;
      }
      form,
      pre {
        margin: 0;
        max-width: 600px;
        padding: 1rem;
        margin: 0 auto;
        overflow: auto;
      }
      input,
      button {
        display: block;
        width: 100%;
        padding: 0.75rem;
        margin: 0.5rem 0 1rem 0;
        border-radius: 8px;
        color: white;
        border: 1px solid #222;
      }
      input {
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.05),
          rgba(255, 255, 255, 0.025)
        );
      }
      input:focus {
        outline: white;
        border-color: white;
      }
      button {
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.15),
          rgba(255, 255, 255, 0.05)
        );
        cursor: pointer;
      }
      button:hover {
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.2),
          rgba(255, 255, 255, 0.1)
        );
      }
      #logout {
        max-width: 200px;
        margin: 0 auto;
      }
    </style>

    <form id="login">
      <h1>Login</h1>
      <label for="email">Email</label>
      <input type="email" id="email" name="email" value="andre@example.com" />
      <label for="password">Senha</label>
      <input
        type="password"
        id="password"
        name="password"
        value="password123456"
      />
      <button>Logar</button>
    </form>

    <form id="update-password">
      <h1>Atualizar senha</h1>
      <label for="current-password">Senha atual</label>
      <input
        type="password"
        id="current-password"
        name="current-password"
        value="password123"
      />
      <label for="new-password">Nova senha</label>
      <input
        type="password"
        id="new-password"
        name="new-password"
        value="password1234"
      />
      <button>Atualizar senha</button>
    </form>

    <form id="forgot-password">
      <h1>Recuperar senha</h1>
      <label for="email">Email</label>
      <input type="email" id="email" name="email" value="andre@example.com" />
      <button>Recuperar senha</button>
    </form>

    <form id="reset-password">
      <h1>Resetar senha</h1>
      <label for="new-password">Nova senha</label>
      <input
        type="password"
        id="new-password"
        name="new-password"
        value="password123456"
      />
      <label for="token">Token</label>
      <input type="text" id="token" name="token" />

      <button>Resetar senha</button>
    </form>

    <button id="logout">Sair</button>

    <pre id="result"></pre>

    <script>
      const loginForm = document.getElementById("login");
      const updatePasswordForm = document.getElementById("update-password");
      const forgotPasswordForm = document.getElementById("forgot-password");
      const resetPasswordForm = document.getElementById("reset-password");
      const logout = document.getElementById("logout");
      const result = document.getElementById("result");

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const data = new FormData(loginForm);
        const response = await fetch("/auth/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(Object.fromEntries(data)),
        });

        const body = await response.json();
        result.innerText = JSON.stringify(body, null, 2);

        if (response.ok) {
          window.location.reload();
        }
      });

      updatePasswordForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const data = new FormData(updatePasswordForm);
        const response = await fetch("/auth/password/update", {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            new_password: data.get("new-password"),
            password: data.get("current-password"),
          }),
        });

        const body = await response.json();
        result.innerText = JSON.stringify(body, null, 2);

        if (response.ok) {
          window.location.reload();
        }
      });

      forgotPasswordForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const data = new FormData(forgotPasswordForm);
        const response = await fetch("/auth/password/forgot", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            email: data.get("email"),
          }),
        });

        const body = await response.json();
        result.innerText = JSON.stringify(body, null, 2);

        if (response.ok) {
          window.location.reload();
        }
      });
  
      resetPasswordForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const data = new FormData(resetPasswordForm);
        const response = await fetch("/auth/password/reset", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            token: data.get("token"),
            new_password: data.get("new-password"),
          }),
        });

        const body = await response.json();
        result.innerText = JSON.stringify(body, null, 2);

        if (response.ok) {
          window.location.reload();
        }
      });

      logout.addEventListener("click", async (e) => {
        e.preventDefault();

        const response = await fetch("/auth/logout", {
          method: "DELETE",
        });

        if (response.ok) {
          window.location.reload();
        }
      });

      async function autenticado() {
        const response = await fetch("/auth/session");
        const body = await response.json();
        result.innerText = JSON.stringify(body, null, 2);
      }

      autenticado();
    </script>
  </body>
</html>
